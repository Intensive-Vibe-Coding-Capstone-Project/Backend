<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cue — Presentation Rescue (text path)</title>
    <style>
      :root {
        --bg: #0f1221;
        --panel: #1a1f37;
        --ink: #e8ecff;
        --muted: #9aa3c7;
        --accent: #7c8cff;
        --good: #46d39a;
        --warn: #f2b65a;
        --line: #2a3157;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--ink);
      }
      header {
        padding: 18px 24px;
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: baseline;
        gap: 12px;
      }
      header h1 { font-size: 20px; margin: 0; }
      header .tag { color: var(--muted); font-size: 13px; }
      main {
        max-width: 920px;
        margin: 0 auto;
        padding: 24px;
        display: grid;
        gap: 18px;
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 18px;
      }
      .panel h2 { margin: 0 0 12px; font-size: 14px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
      .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
      input[type="text"], textarea, input[type="file"] {
        background: #0d1124; color: var(--ink); border: 1px solid var(--line);
        border-radius: 10px; padding: 10px 12px; font-size: 15px; width: 100%;
      }
      textarea { min-height: 64px; resize: vertical; }
      button {
        background: var(--accent); color: #0b0e1c; border: 0; border-radius: 10px;
        padding: 10px 16px; font-size: 15px; font-weight: 600; cursor: pointer;
      }
      button.secondary { background: #2a3157; color: var(--ink); }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      button.listening { background: #f25a78; color: #fff; animation: pulse 1.2s ease-in-out infinite; }
      @keyframes pulse { 50% { opacity: 0.6; } }
      .muted { color: var(--muted); font-size: 13px; }
      .chips { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
      .chip { background: #0d1124; border: 1px solid var(--line); border-radius: 999px; padding: 4px 10px; font-size: 12px; color: var(--muted); }
      .badge { font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 999px; }
      .badge.good { background: rgba(70,211,154,0.15); color: var(--good); }
      .badge.warn { background: rgba(242,182,90,0.15); color: var(--warn); }
      .badge.info { background: rgba(124,140,255,0.18); color: var(--accent); margin-left: 6px; }
      .badge.alert { background: rgba(242,90,120,0.18); color: #f25a78; }
      /* lyric render */
      #script, #liveScript { margin-top: 14px; text-align: center; }
      #script .line, #liveScript .line {
        font-size: 26px; line-height: 1.5; font-weight: 600; padding: 4px 0;
        opacity: 0; transform: translateY(6px); animation: rise 0.4s ease forwards;
      }
      @keyframes rise { to { opacity: 1; transform: none; } }
      ul.history { list-style: none; padding: 0; margin: 0; display: grid; gap: 10px; }
      ul.history#wsLog { max-height: 250px; overflow-y: auto; }
      ul.history li { border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; }
      ul.history .q { color: var(--muted); font-size: 13px; }
      code { color: var(--accent); }
    </style>
  </head>
  <body>
    <header>
      <h1>🎤 Cue</h1>
      <span class="tag">Presentation Rescue · text path demo · <code>v0.1-text</code></span>
    </header>

    <main>
      <section class="panel">
        <h2>1 · Upload a document</h2>
        <div class="row">
          <input type="file" id="file" accept=".pdf,.docx,.txt,.pptx,.epub" multiple />
          <button id="uploadBtn">Upload &amp; index</button>
          <button id="refreshDocs" class="secondary">Refresh list</button>
        </div>
        <div id="docs" class="chips"></div>
      </section>

      <section class="panel">
        <h2>2 · Session</h2>
        <div class="row">
          <input type="text" id="title" placeholder="Session title (optional)" style="flex:1" />
          <button id="startSession">Start session</button>
        </div>
        <p class="muted" id="sessionInfo">No active session.</p>
      </section>

      <section class="panel">
        <h2>3 · Ask — get a rescue</h2>
        <textarea id="question" placeholder="Type the hard question you just got…"></textarea>
        <div class="row" style="margin-top:10px">
          <button id="askBtn">Rescue me</button>
          <span id="status" class="muted"></span>
          <span id="grounded"></span>
        </div>
        <div id="script"></div>
        <div id="citations" class="chips"></div>
      </section>

      <section class="panel">
        <h2>4 · Prepared script <span class="muted" style="text-transform:none;letter-spacing:0">— optional, enables slip alerts</span></h2>
        <textarea id="scriptText" placeholder="Paste your prepared script / talking points…" style="min-height: 200px;"></textarea>
        <div class="row" style="margin-top:10px">
          <input type="text" id="forbidden" placeholder="Forbidden terms, comma-separated (e.g. Shopee, Lazada)" style="flex:1" />
          <button id="saveScript">Save script</button>
          <span id="scriptStatus" class="muted"></span>
        </div>
      </section>

      <section class="panel">
        <h2>5 · Live transcript &amp; auto-rescue (WS)</h2>
        <div class="row">
          <button id="connectWs">Connect</button>
          <button id="disconnectWs" class="secondary" disabled>Disconnect</button>
          <span id="wsStatus" class="muted">Disconnected.</span>
        </div>
        <div class="row" style="margin-top:10px">
          <input type="text" id="transcriptLine" placeholder="Speak with the mic, or type a line — Enter / Send to push…" style="flex:1" />
          <button id="micBtn" class="secondary" disabled>🎤 Speak</button>
          <button id="sendLine" disabled>Send line</button>
        </div>
        <div class="row" style="margin-top:10px">
          <button id="manualTrigger" class="secondary" disabled>Rescue now</button>
          <button id="checkSlip" class="secondary" disabled>Check slip</button>
          <span id="micHint" class="muted"></span>
        </div>
        <div id="liveBadge" style="margin-top:12px"></div>
        <div id="liveScript"></div>
        <div id="liveCitations" class="chips"></div>
        <ul class="history" id="wsLog" style="margin-top:12px"></ul>
      </section>

      <section class="panel">
        <h2>6 · Session history</h2>
        <button id="refreshHistory" class="secondary">Refresh history</button>
        <ul class="history" id="history"></ul>
      </section>
    </main>

    <script>
      let sessionId = null;

      async function api(path, opts) {
        const res = await fetch(path, opts);
        const body = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(body.detail || res.statusText);
        return body;
      }

      const $ = (id) => document.getElementById(id);

      async function loadDocs() {
        const docs = await api("/documents");
        $("docs").innerHTML = docs.length
          ? docs.map((d) => `<span class="chip" style="display:inline-flex;align-items:center;">${d.filename} · ${d.n_chunks} chunks<button class="deleteDoc" data-id="${d.id}" style="background:none;border:none;color:var(--warn);padding:0;margin-left:6px;font-size:14px;cursor:pointer;" title="Delete this file">&times;</button></span>`).join("")
          : '<span class="muted">No documents yet.</span>';
          
        document.querySelectorAll('.deleteDoc').forEach(btn => {
          btn.onclick = async (e) => {
            const id = e.target.getAttribute('data-id');
            try {
              await api(`/documents/${id}`, { method: 'DELETE' });
              await loadDocs();
            } catch (err) {
              alert("Delete failed: " + err.message);
            }
          };
        });
      }

      $("uploadBtn").onclick = async () => {
        const files = $("file").files;
        if (!files.length) return alert("Choose at least one file first.");
        $("uploadBtn").disabled = true;
        try {
          for (let i = 0; i < files.length; i++) {
            const f = files[i];
            const fd = new FormData();
            fd.append("file", f);
            await api("/documents", { method: "POST", body: fd });
          }
          await loadDocs();
          $("file").value = "";
          alert(`Indexed ${files.length} document(s).`);
        } catch (e) {
          alert("Upload failed: " + e.message);
        } finally {
          $("uploadBtn").disabled = false;
        }
      };
      $("refreshDocs").onclick = loadDocs;

      $("startSession").onclick = async () => {
        const s = await api("/sessions", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ title: $("title").value || null }),
        });
        sessionId = s.id;
        $("sessionInfo").innerHTML = `Active session <code>${s.id.slice(0, 8)}</code>${s.title ? " · " + s.title : ""}`;
        await loadHistory();
      };

      function lyricLines(lines) {
        return lines
          .map((l, i) => `<div class="line" style="animation-delay:${i * 0.12}s">${l}</div>`)
          .join("");
      }
      function citationChips(citations) {
        return (citations || [])
          .map((c) => `<span class="chip">${c.filename} · #${c.chunk_index} · ${c.score.toFixed(2)}</span>`)
          .join("");
      }
      function groundedBadge(grounded) {
        return grounded
          ? '<span class="badge good">grounded</span>'
          : '<span class="badge warn">bridge</span>';
      }

      function renderScript(resp) {
        $("grounded").innerHTML = groundedBadge(resp.grounded);
        $("script").innerHTML = lyricLines(resp.lines);
        $("citations").innerHTML = citationChips(resp.citations);
      }

      $("askBtn").onclick = async () => {
        const q = $("question").value.trim();
        if (!q) return;
        $("askBtn").disabled = true;
        $("status").textContent = "Thinking…";
        try {
          const resp = await api("/rescue", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question: q, session_id: sessionId }),
          });
          renderScript(resp);
          $("status").textContent = "";
          if (sessionId) await loadHistory();
        } catch (e) {
          $("status").textContent = "Error: " + e.message;
        } finally {
          $("askBtn").disabled = false;
        }
      };

      async function loadHistory() {
        if (!sessionId) return;
        const s = await api(`/sessions/${sessionId}`);
        $("history").innerHTML = s.turns.length
          ? s.turns
              .map(
                (t) =>
                  `<li><div class="q">Q: ${t.question}</div><div>${t.lines.join(" / ")}</div></li>`
              )
              .join("")
          : '<li class="muted">No turns yet.</li>';
      }
      $("refreshHistory").onclick = loadHistory;

      // --- Prepared script (slip detection) ---
      $("saveScript").onclick = async () => {
        if (!sessionId) return alert("Start a session first.");
        const terms = $("forbidden").value
          .split(",").map((t) => t.trim()).filter(Boolean);
        try {
          await fetch(`/sessions/${sessionId}/script`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text: $("scriptText").value, forbidden_terms: terms }),
          }).then((r) => { if (!r.ok) throw new Error(r.statusText); });
          $("scriptStatus").textContent = `Saved · ${terms.length} forbidden term(s).`;
        } catch (e) {
          $("scriptStatus").textContent = "Save failed: " + e.message;
        }
      };

      // --- Live transcript over WebSocket ---
      let ws = null;
      const wsBtns = ["sendLine", "manualTrigger", "checkSlip"];
      function setWsConnected(on) {
        $("connectWs").disabled = on;
        $("disconnectWs").disabled = !on;
        wsBtns.forEach((id) => ($(id).disabled = !on));
        $("micBtn").disabled = !on || !micSupported();
        if (!on) stopMic();
      }
      function logEvent(html) {
        const li = document.createElement("li");
        li.innerHTML = html;
        $("wsLog").prepend(li);
      }
      function renderLive(badgeHtml, lines, citations) {
        $("liveBadge").innerHTML = badgeHtml;
        $("liveScript").innerHTML = lyricLines(lines);
        $("liveCitations").innerHTML = citationChips(citations);
      }

      function handleWsMessage(msg) {
        if (msg.type === "ack") {
          $("wsStatus").textContent =
            `Connected · ${msg.segments} segs · ${msg.window_chars} chars · silence ${msg.silence_s}s`;
        } else if (msg.type === "rescue") {
          const badge = `${groundedBadge(msg.grounded)}<span class="badge info">${msg.mode}</span>`;
          renderLive(badge, msg.lines, msg.citations);
          logEvent(`<div class="q">rescue · ${msg.mode}</div><div>${msg.lines.join(" / ")}</div>`);
        } else if (msg.type === "correction") {
          const wrong = msg.wrong_terms.length ? ` · ${msg.wrong_terms.join(", ")}` : "";
          const badge = `<span class="badge alert">slip: ${msg.kind}${wrong}</span>`;
          renderLive(badge, msg.lines, []);
          logEvent(`<div class="q">correction · ${msg.kind}${wrong}</div><div>${msg.lines.join(" / ")}</div>`);
        } else if (msg.type === "none") {
          logEvent('<span class="muted">No rescue needed right now.</span>');
        } else if (msg.type === "error") {
          logEvent(`<span class="muted">error: ${msg.detail}</span>`);
        }
      }

      $("connectWs").onclick = () => {
        if (!sessionId) return alert("Start a session first.");
        const proto = location.protocol === "https:" ? "wss" : "ws";
        ws = new WebSocket(`${proto}://${location.host}/stream/${sessionId}`);
        ws.onopen = () => { setWsConnected(true); $("wsStatus").textContent = "Connected."; };
        ws.onmessage = (ev) => handleWsMessage(JSON.parse(ev.data));
        ws.onclose = () => { setWsConnected(false); $("wsStatus").textContent = "Disconnected."; ws = null; };
        ws.onerror = () => { $("wsStatus").textContent = "WS error."; };
      };
      $("disconnectWs").onclick = () => ws && ws.close();

      function sendLine() {
        const line = $("transcriptLine").value.trim();
        if (!line || !ws) return;
        ws.send(JSON.stringify({ text: line }));
        logEvent(`<span class="muted">you: ${line}</span>`);
        $("transcriptLine").value = "";
      }
      $("sendLine").onclick = sendLine;
      $("transcriptLine").addEventListener("keydown", (e) => { if (e.key === "Enter") sendLine(); });
      $("manualTrigger").onclick = () => ws && ws.send(JSON.stringify({ type: "trigger" }));
      $("checkSlip").onclick = () => ws && ws.send(JSON.stringify({ type: "check_slip" }));

      // --- Voice input (browser Web Speech API → same WS text ingest) ---
      const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
      let recognition = null;
      let listening = false;
      function micSupported() { return !!SpeechRec; }

      function startMic() {
        if (!SpeechRec || !ws) return;
        recognition = new SpeechRec();
        recognition.lang = "en-US";
        recognition.continuous = true;     // keep listening across pauses
        recognition.interimResults = true; // preview words as they form
        recognition.onresult = (ev) => {
          let interim = "";
          for (let i = ev.resultIndex; i < ev.results.length; i++) {
            const phrase = ev.results[i][0].transcript;
            if (ev.results[i].isFinal) {
              const text = phrase.trim();
              if (text && ws) {
                ws.send(JSON.stringify({ text })); // push like a typed line
                logEvent(`<span class="muted">🎤 ${text}</span>`);
              }
            } else {
              interim += phrase;
            }
          }
          $("transcriptLine").value = interim; // live preview only
        };
        recognition.onerror = (ev) => {
          $("wsStatus").textContent = "Mic: " + ev.error;
          if (ev.error === "not-allowed" || ev.error === "service-not-allowed") stopMic();
        };
        recognition.onend = () => {
          // Chrome ends the session periodically; restart while still listening.
          if (listening && recognition) { try { recognition.start(); } catch (e) {} }
        };
        try { recognition.start(); } catch (e) {}
        listening = true;
        $("micBtn").textContent = "🛑 Stop";
        $("micBtn").classList.add("listening");
      }

      function stopMic() {
        listening = false;
        if (recognition) {
          recognition.onend = null;
          try { recognition.stop(); } catch (e) {}
          recognition = null;
        }
        $("transcriptLine").value = "";
        $("micBtn").textContent = "🎤 Speak";
        $("micBtn").classList.remove("listening");
      }

      $("micBtn").onclick = () => (listening ? stopMic() : startMic());
      if (!micSupported()) $("micHint").textContent = "🎤 Voice input needs Chrome or Edge.";

      loadDocs();
    </script>
  </body>
</html>
